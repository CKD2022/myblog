            </div>
        `;
    }

    // ============================= 渲染三大模块 =============================
    function renderAllCategories() {
        const container = document.getElementById('reportContainer');

        categoryOrder.forEach(category => {

                y2026Amt: r[4] || 0,
                change: r[4] && r[2] ? ((r[4] - r[2]) / r[2] * 100) : null

                let va = a[state.key], vb = b[state.key];
                if (state.key === 'name') return state.order === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);

                                <th class="px-3 py-2.5 font-semibold cursor-pointer hover:bg-slate-100 text-right" onclick="handleSort('${category}','y2025Amt')"><div class="flex items-center justify-end gap-1">2025金额 <i class="fas fa-sort sort-icon ${getSortIconClass(category,'y2025Amt')}"></i></div></th>
                                <th class="px-3 py-2.5 font-semibold cursor-pointer hover:bg-slate-100 text-center" onclick="handleSort('${category}','y2026Var')"><div class="flex items-center justify-center gap-1">2026品种 <i class="fas fa-sort sort-icon ${getSortIconClass(category,'y2026Var')}"></i></div></th>
                                <th class="px-3 py-2.5 font-semibold cursor-pointer hover:bg-slate-100 text-right" onclick="handleSort('${category}','y2026Amt')"><div class="flex items-center justify-end gap-1">2026金额 <i class="fas fa-sort sort-icon ${getSortIconClass(category,'y2026Amt')}"></i></div></th>
                                <th class="px-3 py-2.5 font-semibold cursor-pointer hover:bg-slate-100 text-center" onclick="handleSort('${category}','change')"><div class="flex items-center justify-center gap-1">同比 <i class="fas fa-sort sort-icon ${getSortIconClass(category,'change')}"></i></div></th>

                    </span>
                    <span class="chart-toggle text-emerald-600 hover:text-emerald-800 text-sm font-medium flex items-center gap-2" onclick="toggleLineCharts('${categoryKey}')">
                        <i class="fas fa-chart-line"></i> <span id="toggleLineLabel_${categoryKey}">📈 展开折线图分析</span>
                    </span>

                <div id="chartContainer_${categoryKey}" class="chart-container hidden px-4 pb-2">
                    <div class="chart-ctrl-bar mb-3">
                        <div class="ctrl-group">
                            <span class="label-text">📐 尺寸</span>
                            <button class="ctrl-btn" onclick="adjustChartSize('${categoryKey}', -10)">−</button>
                            <div class="slider-wrapper"><input type="range" class="size-slider" min="20" max="200" value="${settings.radius||100}" step="5" oninput="adjustChartSizeFromSlider('${categoryKey}', this.value)"></div>
                            <button class="ctrl-btn" onclick="adjustChartSize('${categoryKey}', 10)">+</button>
                            <span class="value-display" id="sizeDisplay_${categoryKey}">${settings.radius||100}%</span>

                            <span class="label-text">🔤 字体</span>
                            <button class="ctrl-btn" onclick="adjustFontSize('${categoryKey}', -1)">−</button>
                            <div class="slider-wrapper"><input type="range" class="font-slider" min="5" max="20" value="${settings.fontSize}" step="0.5" oninput="adjustFontSizeFromSlider('${categoryKey}', this.value)"></div>
                            <button class="ctrl-btn" onclick="adjustFontSize('${categoryKey}', 1)">+</button>
                            <span class="value-display" id="fontSizeDisplay_${categoryKey}">${settings.fontSize}px</span>
                        </div>
                        <div class="ctrl-group checkbox-group">
                            <span class="label-text">显示:</span>
                            <label><input type="checkbox" ${settings.showName ? 'checked' : ''} onchange="toggleShow('${categoryKey}','name',this.checked)"> 厂名</label>
                            <label><input type="checkbox" ${settings.showValue ? 'checked' : ''} onchange="toggleShow('${categoryKey}','value',this.checked)"> 金额</label>
                            <label><input type="checkbox" ${settings.showPercent ? 'checked' : ''} onchange="toggleShow('${categoryKey}','percent',this.checked)"> 占比</label>

                        <button class="reset-btn" onclick="resetChartSettings('${categoryKey}')">重置</button>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 chart-grid">

                        <div class="chart-box"><h4 class="text-xs font-semibold text-slate-700 mb-1 text-center">2026品种分布</h4><canvas id="${pieIds[1]}" height="140"></canvas><div id="legend_${pieIds[1]}" class="chart-legend"></div></div>
                        <div class="chart-box"><h4 class="text-xs font-semibold text-slate-700 mb-1 text-center">2025金额分布</h4><canvas id="${pieIds[2]}" height="140"></canvas><div id="legend_${pieIds[2]}" class="chart-legend"></div></div>
                        <div class="chart-box"><h4 class="text-xs font-semibold text-slate-700 mb-1 text-center">2026金额分布</h4><canvas id="${pieIds[3]}" height="140"></canvas><div id="legend_${pieIds[3]}" class="chart-legend"></div></div>

                        <div class="line-chart-box"><h4 class="text-xs font-semibold text-slate-700 mb-1 text-center">金额两年对比</h4><canvas id="${lineAmtId}" height="140"></canvas></div>

                labels, var2025, var2026, amt2025, amt2026, pieIds

            window[`lineData_${categoryKey}`] = {
                labels, var2025, var2026, amt2025, amt2026, lineVarId, lineAmtId
            };

    // ============================= 排序 =============================
    window.handleSort = function(category, key) {
        const state = sortStates[category];
        if (state.key === key) state.order = state.order === 'asc' ? 'desc' : 'asc';
        else { state.key = key; state.order = 'desc'; }
        renderAllCategories();
        categoryOrder.forEach(cat => {
            const k = cat.replace(/\s/g, '_');
            const pieContainer = document.getElementById(`chartContainer_${k}`);
            if (pieContainer && !pieContainer.classList.contains('hidden')) {
                renderPieCharts(k);
            }
            const lineContainer = document.getElementById(`lineContainer_${k}`);
            if (lineContainer && !lineContainer.classList.contains('hidden')) {
                renderLineCharts(k);
            }
        });
    };
    function getSortIconClass(category, key) {
        const state = sortStates[category];
        if (state.key !== key) return '';
        return state.order === 'asc' ? 'sorted-asc' : 'sorted-desc';
    }

    // ============================= 饼图渲染 =============================
    function renderPieCharts(categoryKey) {
        const data = window[`pieData_${categoryKey}`];
        if (!data) return;
        const { labels, var2025, var2026, amt2025, amt2026, pieIds } = data;
        const settings = getSettings(categoryKey);
        renderSinglePie(pieIds[0], labels, var2025, settings);
        renderSinglePie(pieIds[1], labels, var2026, settings);
        renderSinglePie(pieIds[2], labels, amt2025, settings);
        renderSinglePie(pieIds[3], labels, amt2026, settings);
    }

    function renderSinglePie(canvasId, labels, values, settings) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        if (chartInstances[canvasId]) { chartInstances[canvasId].destroy(); delete chartInstances[canvasId]; }
        const ctx = canvas.getContext('2d');
        const colors = generateColors(labels.length);
        const total = values.reduce((a,b) => a+b, 0);
        const fs = settings.fontSize || 9;
        const showName = settings.showName !== undefined ? settings.showName : true;
        const showValue = settings.showValue || false;
        const showPercent = settings.showPercent || false;
        const radiusPercent = (settings.radius || 100) / 100;

        if (total === 0 || labels.length === 0 || values.every(v => v === 0)) {
            chartInstances[canvasId] = new Chart(ctx, {
                type:'pie',
                data:{labels:['无数据'], datasets:[{data:[1], backgroundColor:['#e2e8f0'], borderWidth:0}]},
                options:{responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}, tooltip:{enabled:false}}}
            });
            const legendContainer = document.getElementById(`legend_${canvasId}`);
            if (legendContainer) legendContainer.innerHTML = '<span class="text-slate-400 text-xs">无数据</span>';
            return;
        }

        const radiusValue = 50 * radiusPercent;
        chartInstances[canvasId] = new Chart(ctx, {
            type: 'pie',
            data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#ffffff' }] },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.label || '';
                                let value = context.parsed || 0;
                                let total = context.dataset.data.reduce((a,b) => a+b, 0);
                                let pct = total > 0 ? ((value/total)*100).toFixed(1) : 0;
                                return label + ': ' + value.toFixed(1) + ' (' + pct + '%)';
                            }
                        }
                    }
                },
                radius: Math.min(radiusValue, 100) + '%'
            },
            plugins: [{
                id: 'customLabels',
                afterDraw(chart) {
                    const { ctx, data } = chart;
                    const meta = chart.getDatasetMeta(0);
                    const total = data.datasets[0].data.reduce((a,b) => a+b, 0);
                    if (total === 0) return;
                    const sizeFactor = Math.min(radiusPercent, 1.5);
                    const fontSizeFinal = Math.max(4, Math.min(22, fs * Math.min(sizeFactor * 1.1, 1.8)));
                    ctx.font = `bold ${fontSizeFinal}px Inter, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    meta.data.forEach((arc, i) => {
                        const value = data.datasets[0].data[i];
                        const percentage = ((value / total) * 100);
                        if (percentage < 2) return;
                        const label = data.labels[i];
                        const angle = (arc.startAngle + arc.endAngle) / 2;
                        const radius = arc.outerRadius * 0.65;
                        const x = arc.x + Math.cos(angle) * radius;
                        const y = arc.y + Math.sin(angle) * radius;
                        let parts = [];
                        if (showName) {
                            const maxLen = Math.max(4, Math.floor(10 * Math.min(sizeFactor, 1.2)));
                            const disp = label.length > maxLen ? label.substring(0, maxLen-1) + '…' : label;
                            parts.push(disp);
                        }
                        if (showValue) parts.push(value.toFixed(1));
                        if (showPercent) parts.push(percentage.toFixed(1) + '%');
                        if (parts.length === 0) return;
                        ctx.shadowColor = 'rgba(255,255,255,0.8)';
                        ctx.shadowBlur = 4;
                        ctx.fillStyle = '#1e293b';
                        const txt = parts.join(' ');
                        if (txt.length > 12) {
                            const mid = Math.ceil(txt.length/2);
                            ctx.fillText(txt.substring(0, mid), x, y - fontSizeFinal*0.6);
                            ctx.fillText(txt.substring(mid), x, y + fontSizeFinal*0.6);
                        } else {
                            ctx.fillText(txt, x, y);
                        }
                        ctx.shadowBlur = 0;
                    });
                }
            }]
        });

        const legendContainer = document.getElementById(`legend_${canvasId}`);
        if (legendContainer) {
            let html = '';
            const totalVal = values.reduce((a,b) => a+b, 0);
            labels.forEach((label, i) => {
                const pct = totalVal > 0 ? ((values[i]/totalVal)*100).toFixed(1) : 0;
                html += `<div class="chart-legend-item"><span class="chart-legend-color" style="background:${colors[i%colors.length]};"></span><span class="chart-legend-label" title="${label}">${label}</span><span style="color:#64748b;font-size:10px;">${pct}%</span></div>`;
            });
            legendContainer.innerHTML = html;
        }
    }

    // ============================= 折线图渲染 =============================
    function renderLineCharts(categoryKey) {
        const data = window[`lineData_${categoryKey}`];
        if (!data) return;
        const { labels, var2025, var2026, amt2025, amt2026, lineVarId, lineAmtId } = data;
        renderSingleLine(lineVarId, labels, var2025, var2026, '品种', '#4F46E5', '#10B981');
        renderSingleLine(lineAmtId, labels, amt2025, amt2026, '金额', '#F59E0B', '#EF4444');
    }

    function renderSingleLine(canvasId, labels, data2025, data2026, label, color2025, color2026) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;
        if (chartInstances[canvasId]) { chartInstances[canvasId].destroy(); delete chartInstances[canvasId]; }
        const ctx = canvas.getContext('2d');

        const filtered = labels.map((l, i) => ({ label: l, d2025: data2025[i] || 0, d2026: data2026[i] || 0 }));
        const hasData = filtered.some(d => d.d2025 > 0 || d.d2026 > 0);
        if (!hasData) {
            chartInstances[canvasId] = new Chart(ctx, {
                type: 'line',
                data: { labels: ['无数据'], datasets: [{ data: [0], borderColor: '#e2e8f0', backgroundColor: 'transparent' }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } }
            });
            return;
        }

        const displayLabels = filtered.map(d => d.label.length > 6 ? d.label.substring(0,5)+'…' : d.label);
        const d2025 = filtered.map(d => d.d2025);
        const d2026 = filtered.map(d => d.d2026);

        chartInstances[canvasId] = new Chart(ctx, {
            type: 'line',
            data: {
                labels: displayLabels,
                datasets: [
                    {
                        label: '2025年',
                        data: d2025,
                        borderColor: color2025,
                        backgroundColor: color2025 + '33',
                        fill: true,
                        tension: 0.2,
                        pointRadius: 3,
                        pointBackgroundColor: color2025,
                    },
                    {
                        label: '2026年',
                        data: d2026,
                        borderColor: color2026,
                        backgroundColor: color2026 + '33',
                        fill: true,
                        tension: 0.2,
                        pointRadius: 3,
                        pointBackgroundColor: color2026,
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { boxWidth: 12, padding: 8, font: { size: 10 } }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.dataset.label + ': ' + context.parsed.y.toFixed(1);
                            }
                        }
                    }
                },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 9 } } },
                    x: { ticks: { font: { size: 9 }, maxRotation: 30 } }
                }
            }
        });
    }

    // ============================= 展开/收起控制 =============================
    window.toggleCharts = function(categoryKey) {
        const container = document.getElementById(`chartContainer_${categoryKey}`);
        const label = document.getElementById(`toggleLabel_${categoryKey}`);
        if (!container) return;
        const isHidden = container.classList.contains('hidden');
        if (isHidden) {
            container.classList.remove('hidden');
            label.textContent = '📊 收起饼图分析';
            renderPieCharts(categoryKey);
        } else {
            container.classList.add('hidden');
            label.textContent = '📊 展开饼图分析';
            const data = window[`pieData_${categoryKey}`];
            if (data) {
                data.pieIds.forEach(id => {
                    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
                });
            }
        }
    };

    window.toggleLineCharts = function(categoryKey) {
        const container = document.getElementById(`lineContainer_${categoryKey}`);
        const label = document.getElementById(`toggleLineLabel_${categoryKey}`);
        if (!container) return;
        const isHidden = container.classList.contains('hidden');
        if (isHidden) {
            container.classList.remove('hidden');
            label.textContent = '📈 收起折线图分析';
            renderLineCharts(categoryKey);
        } else {
            container.classList.add('hidden');
            label.textContent = '📈 展开折线图分析';
            const data = window[`lineData_${categoryKey}`];
            if (data) {
                [data.lineVarId, data.lineAmtId].forEach(id => {
                    if (chartInstances[id]) { chartInstances[id].destroy(); delete chartInstances[id]; }
                });
            }
        }
    };

    // ============================= 字号/尺寸控制 =============================
    window.adjustTableFontSize = function(categoryKey, delta) {
        const settings = getSettings(categoryKey);
        let newSize = (settings.tableFontSize || 12) + delta;
        if (newSize < 9) newSize = 9; if (newSize > 18) newSize = 18;
        settings.tableFontSize = newSize;
        document.getElementById(`tableFontSizeDisplay_${categoryKey}`).textContent = newSize + 'px';
        const slider = document.querySelector(`#chartContainer_${categoryKey} .table-font-slider`);
        if (slider) slider.value = newSize;
        applyTableFontSize(categoryKey);
    };
    window.adjustTableFontSizeFromSlider = function(categoryKey, value) {
        const settings = getSettings(categoryKey);
        settings.tableFontSize = parseInt(value);
        document.getElementById(`tableFontSizeDisplay_${categoryKey}`).textContent = settings.tableFontSize + 'px';
        applyTableFontSize(categoryKey);
    };
    function applyTableFontSize(categoryKey) {
        const settings = getSettings(categoryKey);
        const table = document.getElementById(`table_${categoryKey}`);
        if (!table) return;
        const fs = settings.tableFontSize || 12;
        table.querySelectorAll('td, tbody tr, tbody td, .total-row td, .total-row').forEach(el => el.style.fontSize = fs + 'px');
        table.querySelectorAll('thead th').forEach(el => el.style.fontSize = Math.max(10, fs-1) + 'px');
    }
    window.adjustChartSize = function(categoryKey, delta) {
        const s = getSettings(categoryKey);
        let n = (s.radius||100) + delta;
        if (n < 20) n = 20; if (n > 200) n = 200;
        s.radius = n;
        document.getElementById(`sizeDisplay_${categoryKey}`).textContent = n + '%';
        const slider = document.querySelector(`#chartContainer_${categoryKey} .size-slider`);
        if (slider) slider.value = n;
        const pieContainer = document.getElementById(`chartContainer_${categoryKey}`);
        if (pieContainer && !pieContainer.classList.contains('hidden')) renderPieCharts(categoryKey);
    };
    window.adjustChartSizeFromSlider = function(categoryKey, value) {
        const s = getSettings(categoryKey);
        s.radius = parseInt(value);
        document.getElementById(`sizeDisplay_${categoryKey}`).textContent = s.radius + '%';
        const pieContainer = document.getElementById(`chartContainer_${categoryKey}`);
        if (pieContainer && !pieContainer.classList.contains('hidden')) renderPieCharts(categoryKey);
    };
    window.adjustFontSize = function(categoryKey, delta) {
        const s = getSettings(categoryKey);
        let n = s.fontSize + delta;
        if (n < 5) n = 5; if (n > 20) n = 20;
        s.fontSize = n;
        document.getElementById(`fontSizeDisplay_${categoryKey}`).textContent = n + 'px';
        const slider = document.querySelector(`#chartContainer_${categoryKey} .font-slider`);
        if (slider) slider.value = n;
        const pieContainer = document.getElementById(`chartContainer_${categoryKey}`);
        if (pieContainer && !pieContainer.classList.contains('hidden')) renderPieCharts(categoryKey);
    };
    window.adjustFontSizeFromSlider = function(categoryKey, value) {
        const s = getSettings(categoryKey);
        s.fontSize = parseFloat(value);
        document.getElementById(`fontSizeDisplay_${categoryKey}`).textContent = s.fontSize + 'px';
        const pieContainer = document.getElementById(`chartContainer_${categoryKey}`);
        if (pieContainer && !pieContainer.classList.contains('hidden')) renderPieCharts(categoryKey);
    };
    window.toggleShow = function(categoryKey, type, checked) {
        const s = getSettings(categoryKey);
        if (type === 'name') s.showName = checked;
        else if (type === 'value') s.showValue = checked;
        else if (type === 'percent') s.showPercent = checked;
        const pieContainer = document.getElementById(`chartContainer_${categoryKey}`);
        if (pieContainer && !pieContainer.classList.contains('hidden')) renderPieCharts(categoryKey);
    };
    window.resetChartSettings = function(categoryKey) {
        const s = getSettings(categoryKey);
        s.radius = 100; s.fontSize = 9; s.showName = true; s.showValue = false; s.showPercent = false; s.tableFontSize = 12;
        document.getElementById(`sizeDisplay_${categoryKey}`).textContent = '100%';
        document.getElementById(`fontSizeDisplay_${categoryKey}`).textContent = '9px';
        document.getElementById(`tableFontSizeDisplay_${categoryKey}`).textContent = '12px';
        const container = document.getElementById(`chartContainer_${categoryKey}`);
        if (container) {
            const sizeSlider = container.querySelector('.size-slider'); if (sizeSlider) sizeSlider.value = 100;
            const fontSlider = container.querySelector('.font-slider'); if (fontSlider) fontSlider.value = 9;
            const checks = container.querySelectorAll('.checkbox-group input[type="checkbox"]');
            if (checks.length >= 3) { checks[0].checked = true; checks[1].checked = false; checks[2].checked = false; }
        }
        applyTableFontSize(categoryKey);
        const pieContainer = document.getElementById(`chartContainer_${categoryKey}`);
        if (pieContainer && !pieContainer.classList.contains('hidden')) renderPieCharts(categoryKey);
    };

    // ============================= 印务有偿表 =============================
    function renderFeeTable() {
        const tbody = document.getElementById('feeBody');
        let html = '';
        feeData.forEach(item => {
            const change = item.y2025 ? ((item.y2026 - item.y2025)/item.y2025*100) : null;
            const color = change === null ? 'text-slate-400' : (change >= 0 ? 'text-green-600' : 'text-red-500');
            html += `<tr>
                <td class="font-medium">${item.item}</td>
                <td class="text-right font-mono">${item.y2025.toLocaleString()}</td>
                <td class="text-right font-mono font-semibold">${item.y2026.toLocaleString()}</td>
                <td class="text-center font-mono ${color}">${change !== null ? (change >= 0 ? '+' : '') + change.toFixed(1) + '%' : '-'}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    // ============================= 导出CSV =============================
    window.exportToCSV = function() {
        let csv = "data:text/csv;charset=utf-8,\uFEFF";
        csv += "类别,厂商,2025品种,2025金额,2026品种,2026金额,同比%\n";
        categoryOrder.forEach(cat => {
            const rows = sheetData[cat] || [];
            rows.forEach(r => {
                const change = r[4] && r[2] ? ((r[4]-r[2])/r[2]*100).toFixed(1) : '';
                csv += `${cat},${r[0]},${r[1]||''},${r[2]||''},${r[3]||''},${r[4]||''},${change}\n`;
            });
        });
        csv += "\n印务有偿\n项目,2025年,2026年,同比%\n";
        feeData.forEach(d => {
            const ch = d.y2025 ? ((d.y2026-d.y2025)/d.y2025*100).toFixed(1) : '';
            csv += `${d.item},${d.y2025},${d.y2026},${ch}\n`;
        });
        const link = document.createElement('a');
        link.href = encodeURI(csv);
        link.download = "印务有偿及排印装结算_2026上半年.csv";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // ============================= 初始化 =============================
    document.addEventListener('DOMContentLoaded', () => {
        renderGlobalStats();
        renderAllCategories();
        renderFeeTable();
    });
</script>
                </div>
            </article>
        </div>
        

    <footer class="footer">
        <p>© 2026 印务生产数据 · Powered by Python</p>

    <div class="settings-panel" id="settingsPanel">
        <h3>🔧 显示设置</h3>
        <label>📐 内容宽度 <span id="widthValue">100%</span></label>
        <input type="range" id="widthSlider" min="600" max="1400" value="1400" step="50">
        <div style="margin-top: 16px;">
            <span style="font-size:14px; font-weight:500;">🎨 配色方案</span>
            <div class="color-schemes">
                <button data-scheme="default">默认</button>
                <button data-scheme="light-gray">浅灰</button>
                <button data-scheme="warm">护眼米色</button>
                <button data-scheme="dark">深色</button>
                <button data-scheme="dark-black">纯黑</button>
            </div>
        </div>
        <button id="resetSettings" style="margin-top:12px; width:100%; padding:8px; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--text); cursor:pointer;">恢复默认</button>
    </div>

    <script>
        (function() {
            const root = document.documentElement;
            const body = document.body;
            const toggleBtn = document.getElementById('settingsToggle');
            const panel = document.getElementById('settingsPanel');

            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                panel.classList.toggle('show');
            });
            document.addEventListener('click', function(e) {
                if (!panel.contains(e.target) && e.target !== toggleBtn) {
                    panel.classList.remove('show');
                }
            });

            const widthSlider = document.getElementById('widthSlider');
            const widthValue = document.getElementById('widthValue');
            function setWidth(val) {
                let maxWidth = val >= 1400 ? '100%' : val + 'px';
                root.style.setProperty('--content-max-width', maxWidth);
                widthValue.textContent = maxWidth;
                localStorage.setItem('reportWidth', val);
            }
            const savedWidth = localStorage.getItem('reportWidth') || 1400;
            widthSlider.value = savedWidth;
            setWidth(savedWidth);
            widthSlider.addEventListener('input', function(e) { setWidth(e.target.value); });

            const schemeButtons = document.querySelectorAll('.color-schemes button');
            function applyScheme(scheme) {
                body.className = '';
                if (scheme && scheme !== 'default') body.classList.add(scheme);
                localStorage.setItem('colorScheme', scheme);
                schemeButtons.forEach(function(btn) {
                    btn.classList.remove('active');
                    if (btn.dataset.scheme === scheme) btn.classList.add('active');
                });
            }
            applyScheme(localStorage.getItem('colorScheme') || 'default');
            schemeButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    applyScheme(btn.dataset.scheme);
                });
            });
            document.getElementById('resetSettings').addEventListener('click', function() {
                widthSlider.value = 1400;
                setWidth(1400);
                applyScheme('default');
            });
        })();
    </script>
