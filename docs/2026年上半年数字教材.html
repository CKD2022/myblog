        function initFontSizeControl() {
            var controls = document.querySelectorAll('.font-size-control');
            controls.forEach(function(ctrl) {
                var decBtn = ctrl.querySelector('.fontDecBtn');
                var incBtn = ctrl.querySelector('.fontIncBtn');
                var display = ctrl.querySelector('.size-display');

                var tableId = ctrl.getAttribute('data-table');
                var table = document.getElementById(tableId);
                if (!table) {
                    var card = ctrl.closest('.card');
                    table = card ? card.querySelector('table') : null;
                }
                if (!table) return;

                var currentSize = 0.80;

                function updateTableFontSize(size) {
                    if (size < 0.5) size = 0.5;
                    if (size > 2.0) size = 2.0;
                    currentSize = size;

                    var cells = table.querySelectorAll('th, td');
                    cells.forEach(function(cell) {
                        cell.style.fontSize = size + 'rem';
                    });

                    display.textContent = size.toFixed(2) + 'rem';
                }

                var newDec = decBtn.cloneNode(true);
                var newInc = incBtn.cloneNode(true);
                decBtn.parentNode.replaceChild(newDec, decBtn);
                incBtn.parentNode.replaceChild(newInc, incBtn);

                newDec.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    updateTableFontSize(currentSize - 0.05);
                });

                newInc.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    updateTableFontSize(currentSize + 0.05);
                });

                var displayText = display.textContent.trim();
                var match = displayText.match(/^([\d.]+)/);
                if (match) {
                    var parsed = parseFloat(match[1]);
                    if (!isNaN(parsed) && parsed >= 0.3 && parsed <= 2.5) {
                        currentSize = parsed;
                    }
                }
                updateTableFontSize(currentSize);
            });
        }

        initFontSizeControl();

    </div>

    <script>
        (function() {
            const root = document.documentElement;
            const body = document.body;
            const toggleBtn = document.getElementById('settingsToggle');
            const panel = document.getElementById('settingsPanel');

            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                panel.classList.toggle('show');
            });
            document.addEventListener('click', function(e) {
                if (!panel.contains(e.target) && e.target !== toggleBtn) {
                    panel.classList.remove('show');
                }
            });

            const widthSlider = document.getElementById('widthSlider');
            const widthValue = document.getElementById('widthValue');
            function setWidth(val) {
                let maxWidth = val >= 1400 ? '100%' : val + 'px';
                root.style.setProperty('--content-max-width', maxWidth);
                widthValue.textContent = maxWidth;
                localStorage.setItem('reportWidth', val);
            }
            const savedWidth = localStorage.getItem('reportWidth') || 1400;
            widthSlider.value = savedWidth;
            setWidth(savedWidth);
            widthSlider.addEventListener('input', function(e) { setWidth(e.target.value); });

            const schemeButtons = document.querySelectorAll('.color-schemes button');
            function applyScheme(scheme) {
                body.className = '';
                if (scheme && scheme !== 'default') body.classList.add(scheme);
                localStorage.setItem('colorScheme', scheme);
                schemeButtons.forEach(function(btn) {
                    btn.classList.remove('active');
                    if (btn.dataset.scheme === scheme) btn.classList.add('active');
                });
            }
            applyScheme(localStorage.getItem('colorScheme') || 'default');
            schemeButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    applyScheme(btn.dataset.scheme);
                });
            });
            document.getElementById('resetSettings').addEventListener('click', function() {
                widthSlider.value = 1400;
                setWidth(1400);
                applyScheme('default');
            });
        })();
    </script>
