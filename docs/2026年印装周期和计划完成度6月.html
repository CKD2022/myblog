        function applyChartSettings(categoryKey) {
            const container = document.getElementById(`chartContainer_${categoryKey}`);
            if (!container || container.classList.contains('hidden')) return;
            const settings = getSettings(categoryKey);

            const data = window[`chartData_${categoryKey}`];
            if (data) {
                if (chartInstances[data.chartId1]) {
                    chartInstances[data.chartId1].destroy();
                    delete chartInstances[data.chartId1];
                }
                if (chartInstances[data.chartId2]) {
                    chartInstances[data.chartId2].destroy();
                    delete chartInstances[data.chartId2];
                }
                renderChart(data.chartId1, data.chartData1.labels, data.chartData1.values, settings);
                renderChart(data.chartId2, data.chartData2.labels, data.chartData2.values, settings);

        window.toggleCharts = function(categoryKey) {
            const container = document.getElementById(`chartContainer_${categoryKey}`);
            const label = document.getElementById(`toggleLabel_${categoryKey}`);
            if (!container) return;
            const isHidden = container.classList.contains('hidden');

                container.classList.remove('hidden');
                label.textContent = '📊 收起饼图分析';
                const settings = getSettings(categoryKey);
                const data = window[`chartData_${categoryKey}`];
                if (data) {

                applyTableFontSize(categoryKey);
            } else {
                container.classList.add('hidden');
                label.textContent = '📊 展开饼图分析';
                const data = window[`chartData_${categoryKey}`];
                if (data) {

        function renderChart(canvasId, labels, values, settings) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
                delete chartInstances[canvasId];
            }
            const ctx = canvas.getContext('2d');
            const colors = generateColors(labels.length);

            const total = values.reduce((a, b) => a + b, 0);
            const fs = settings.fontSize || 9;
            const showName = settings.showName !== undefined ? settings.showName : true;
            const showValue = settings.showValue || false;
            const showPercent = settings.showPercent || false;
            // radius: 20% ~ 200% 控制饼图实际大小
            const radiusPercent = (settings.radius || 100) / 100;

            if (total === 0 || labels.length === 0) {
                chartInstances[canvasId] = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['无数据'],
                        datasets: [{
                            data: [1],
                            backgroundColor: ['#e2e8f0'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: false }
                        }
                    },
                    plugins: [{
                        id: 'noDataLabel',
                        afterDraw(chart) {
                            const { ctx } = chart;
                            ctx.save();
                            ctx.font = '14px Inter, sans-serif';
                            ctx.fillStyle = '#94a3b8';
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            const { width, height } = chart;
                            ctx.fillText('暂无数据', width / 2, height / 2);
                            ctx.restore();
                        }
                    }]
                });
                return;
            }

            // 计算半径：基础半径50%，乘以百分比
            const radiusValue = 50 * radiusPercent;

            chartInstances[canvasId] = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: { 
                        legend: { display: false }, 
                        tooltip: { 
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    let value = context.parsed || 0;
                                    let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    let percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                    return label + ': ' + value.toFixed(1) + ' (' + percentage + '%)';
                                }
                            }
                        }
                    },
                    // 关键：通过radius控制饼图实际大小
                    radius: Math.min(radiusValue, 100) + '%'
                },
                plugins: [{
                    id: 'customLabels',
                    afterDraw(chart) {
                        const { ctx, data } = chart;
                        const meta = chart.getDatasetMeta(0);
                        const total = data.datasets[0].data.reduce((a, b) => a + b, 0);
                        if (total === 0) return;
                        // 根据饼图大小调整字体
                        const sizeFactor = Math.min(radiusPercent, 1.5);
                        const fontSizeFinal = Math.max(4, Math.min(22, fs * Math.min(sizeFactor * 1.1, 1.8)));
                        ctx.font = `bold ${fontSizeFinal}px Inter, sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        meta.data.forEach((arc, i) => {
                            const value = data.datasets[0].data[i];
                            const percentage = ((value / total) * 100);
                            if (percentage < 2) return;
                            const label = data.labels[i];
                            const angle = (arc.startAngle + arc.endAngle) / 2;
                            const radius = arc.outerRadius * 0.65;
                            const x = arc.x + Math.cos(angle) * radius;
                            const y = arc.y + Math.sin(angle) * radius;

                            let displayParts = [];
                            if (showName) {
                                const maxLen = Math.max(4, Math.floor(10 * Math.min(sizeFactor, 1.2)));
                                const displayLabel = label.length > maxLen ? label.substring(0, maxLen - 1) + '…' : label;
                                displayParts.push(displayLabel);
                            }
                            if (showValue) {
                                displayParts.push(value.toFixed(1));
                            }
                            if (showPercent) {
                                displayParts.push(percentage.toFixed(1) + '%');
                            }
                            if (displayParts.length === 0) return;

                            ctx.shadowColor = 'rgba(255,255,255,0.8)';
                            ctx.shadowBlur = 4;
                            ctx.fillStyle = '#1e293b';
                            const displayText = displayParts.join(' ');
                            if (displayText.length > 12) {
                                const mid = Math.ceil(displayText.length / 2);
                                const firstPart = displayText.substring(0, mid);
                                const secondPart = displayText.substring(mid);
                                ctx.fillText(firstPart, x, y - fontSizeFinal * 0.6);
                                ctx.fillText(secondPart, x, y + fontSizeFinal * 0.6);
                            } else {
                                ctx.fillText(displayText, x, y);
                            }
                            ctx.shadowBlur = 0;
                        });
                    }
                }]
            });

            const legendContainer = document.getElementById(`legend_${canvasId}`);
            if (legendContainer) {
                let legendHtml = '';
                const totalVal = values.reduce((a, b) => a + b, 0);
                labels.forEach((label, i) => {
                    const pct = totalVal > 0 ? ((values[i] / totalVal) * 100).toFixed(1) : 0;
                    legendHtml += `
                        <div class="chart-legend-item">
                            <span class="chart-legend-color" style="background: ${colors[i % colors.length]};"></span>
                            <span class="chart-legend-label" title="${label}">${label}</span>
                            <span style="color:#64748b;font-size:10px;">${pct}%</span>
                        </div>
                    `;
                });
                legendContainer.innerHTML = legendHtml;
            }
        }

        window.handleSort = function(category, key) {
            const state = sortStates[category];
            if (state.key === key) state.order = state.order === 'asc' ? 'desc' : 'asc';
            else { state.key = key; state.order = 'desc'; }
            renderAllCategories();
        };

        function getSortIconClass(category, key) {
            const state = sortStates[category];
            if (state.key !== key) return '';
            return state.order === 'asc' ? 'sorted-asc' : 'sorted-desc';
        }

        function renderSpecialPaperTable() {
            const tbody = document.getElementById('specialPaperBody');
            const countSpan = document.getElementById('specialPaperCount');
            const totalContract = document.getElementById('specialTotalContract');
            const totalNonRate = document.getElementById('specialTotalNonRate');

            if (!tbody) return;

            if (specialPaperData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="no-data">暂无特殊纸令数扣减数据</td></tr>`;
                if (countSpan) countSpan.textContent = '共 0 家';
                if (totalContract) totalContract.textContent = '0.00';
                if (totalNonRate) totalNonRate.textContent = '0.00';
                return;
            }

            if (countSpan) countSpan.textContent = `共 ${specialPaperData.length} 家`;

            let html = '';
            let totalContractVal = 0;
            let totalNonRateVal = 0;

            specialPaperData.forEach(item => {
                const contract = item.contract_paper || 0;
                const nonRate = item.non_rate_paper || 0;
                totalContractVal += contract;
                totalNonRateVal += nonRate;
                html += `
                    <tr>
                        <td>${item.factory}</td>
                        <td>${Number(contract).toFixed(2).toLocaleString()}</td>
                        <td>${Number(nonRate).toFixed(2).toLocaleString()}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;

            if (totalContract) totalContract.textContent = Number(totalContractVal).toFixed(2).toLocaleString();
            if (totalNonRate) totalNonRate.textContent = Number(totalNonRateVal).toFixed(2).toLocaleString();

            applySpecialTableFontSize();
        }

        window.exportToCSV = function() {
            let csv = "data:text/csv;charset=utf-8,\uFEFF";
            csv += "类别,印厂名称,本月总品种,总品种平均周期,无线胶钉品种,无线胶钉周期,锁线胶订品种,锁线胶订周期,精装品种,精装周期,全年计划纸令,实际累计进栈,已完成比例,上年同期进栈,同比增长%\n";
            rawData.forEach(item => {
                const rate = (item.plan && item.plan > 0) ? ((item.actual / item.plan) * 100).toFixed(2) : 0;
                const yoy = (item.yoy !== null && item.yoy !== undefined) ? item.yoy.toFixed(2) : '';
                csv += `${item.category},${item.name},${item.totalVariety},${item.totalCycle||''},${item.wbVariety},${item.wbCycle||''},${item.sewnVariety},${item.sewnCycle||''},${item.hardVariety},${item.hardCycle||''},${item.plan||''},${item.actual},${rate},${item.lastYear||''},${yoy}\n`;
            });
            csv += "\n\n特殊纸令数扣减统计\n";
            csv += "印装厂,签合同纸令数,非额定工价纸令数\n";
            specialPaperData.forEach(item => {
                csv += `${item.factory},${item.contract_paper},${item.non_rate_paper}\n`;
            });
            const link = document.createElement('a');
            link.href = encodeURI(csv);
            link.download = "印装生产数据_2026.csv";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>

    <div class="settings-panel" id="settingsPanel">
        <h3>🔧 显示设置</h3>
        <label>📐 内容宽度 <span id="widthValue">100%</span></label>
        <input type="range" id="widthSlider" min="600" max="1400" value="1400" step="50">
        <div style="margin-top: 16px;">
            <span style="font-size:14px; font-weight:500;">🎨 配色方案</span>
            <div class="color-schemes">
                <button data-scheme="default">默认</button>
                <button data-scheme="light-gray">浅灰</button>
                <button data-scheme="warm">护眼米色</button>
                <button data-scheme="dark">深色</button>
                <button data-scheme="dark-black">纯黑</button>
            </div>
        </div>
        <button id="resetSettings" style="margin-top:12px; width:100%; padding:8px; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--text); cursor:pointer;">恢复默认</button>
    </div>

    <script>
        (function() {
            const root = document.documentElement;
            const body = document.body;
            const toggleBtn = document.getElementById('settingsToggle');
            const panel = document.getElementById('settingsPanel');

            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                panel.classList.toggle('show');
            });
            document.addEventListener('click', function(e) {
                if (!panel.contains(e.target) && e.target !== toggleBtn) {
                    panel.classList.remove('show');
                }
            });

            const widthSlider = document.getElementById('widthSlider');
            const widthValue = document.getElementById('widthValue');
            function setWidth(val) {
                let maxWidth = val >= 1400 ? '100%' : val + 'px';
                root.style.setProperty('--content-max-width', maxWidth);
                widthValue.textContent = maxWidth;
                localStorage.setItem('reportWidth', val);
            }
            const savedWidth = localStorage.getItem('reportWidth') || 1400;
            widthSlider.value = savedWidth;
            setWidth(savedWidth);
            widthSlider.addEventListener('input', function(e) { setWidth(e.target.value); });

            const schemeButtons = document.querySelectorAll('.color-schemes button');
            function applyScheme(scheme) {
                body.className = '';
                if (scheme && scheme !== 'default') body.classList.add(scheme);
                localStorage.setItem('colorScheme', scheme);
                schemeButtons.forEach(function(btn) {
                    btn.classList.remove('active');
                    if (btn.dataset.scheme === scheme) btn.classList.add('active');
                });
            }
            applyScheme(localStorage.getItem('colorScheme') || 'default');
            schemeButtons.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    applyScheme(btn.dataset.scheme);
                });
            });
            document.getElementById('resetSettings').addEventListener('click', function() {
                widthSlider.value = 1400;
                setWidth(1400);
                applyScheme('default');
            });
        })();
    </script>
